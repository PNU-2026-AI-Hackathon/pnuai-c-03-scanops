services:
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8090 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=${ZAP_API_KEY}
    ports:
      - "8090:8090"
    networks:
      - scanops-net
    restart: unless-stopped

  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    ports:
      - "4280:80"
    environment:
      DB_SERVER: dvwa-db
      DB_PORT: 3306
      DB_DATABASE: dvwa
      DB_USER: ${DVWA_DB_USER:-dvwa}
      DB_PASSWORD: ${DVWA_DB_PASSWORD:-dvwa}
    depends_on:
      - dvwa-db
    networks:
      - scanops-net
    restart: unless-stopped

  dvwa-db:
    image: mariadb:10
    environment:
      MARIADB_ROOT_PASSWORD: ${DVWA_DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: dvwa
      MARIADB_USER: ${DVWA_DB_USER:-dvwa}
      MARIADB_PASSWORD: ${DVWA_DB_PASSWORD:-dvwa}
    volumes:
      - dvwa-db-data:/var/lib/mysql
    networks:
      - scanops-net
    restart: unless-stopped

  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scanops}
      POSTGRES_USER: ${POSTGRES_USER:-scanops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanops}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - scanops-net
    restart: unless-stopped

networks:
  scanops-net:
    driver: bridge

volumes:
  dvwa-db-data:
  postgres-data:
