name: ScanOps Security Scan

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# мӮ¬мҡ© л°©лІ•:
#   1. мқҙ нҢҢмқјмқ„ .github/workflows/scanops-security.yml лЎң м ҖмһҘ
#   2. л ҲнҸ¬ Settings > Secrets and variables > Actions м—җм„ң мӢңнҒ¬лҰҝ л“ұлЎқ:
#      - SCANOPS_API_URL : https://scanops-backend-production.up.railway.app
#      - SCANOPS_API_KEY : (ScanOps нҢҖм—җм„ң л°ңкёүл°ӣмқҖ нӮӨ)
#   3. main лёҢлһңм№ҳлЎң PR мҳ¬лҰ¬л©ҙ мһҗлҸҷ мӢӨн–ү
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    name: ScanOps ліҙм•Ҳ м·Ём•Ҫм җ л¶„м„қ
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Run ScanOps Security Analysis
        uses: actions/github-script@v7
        env:
          SCANOPS_API_URL: ${{ secrets.SCANOPS_API_URL }}
          SCANOPS_API_KEY: ${{ secrets.SCANOPS_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            const TARGET_EXTS = new Set([
              '.java', '.kt', '.jsx', '.tsx', '.js', '.ts',
              '.py', '.go', '.rs', '.c', '.cpp', '.h',
              '.php', '.rb', '.yml', '.yaml'
            ]);
            const EXCLUDE_DIRS = [
              'node_modules', '.git', 'dist', 'build',
              'target', 'vendor', '__pycache__', '.venv'
            ];

            // в”Җв”Җ 1. PR ліҖкІҪ нҢҢмқј лӘ©лЎқ мЎ°нҡҢ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const { data: changedFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 50
            });

            const targetFiles = changedFiles.filter(f => {
              if (f.status === 'removed') return false;
              const ext = path.extname(f.filename).toLowerCase();
              if (!TARGET_EXTS.has(ext)) return false;
              return !EXCLUDE_DIRS.some(d =>
                f.filename.includes(`/${d}/`) || f.filename.startsWith(`${d}/`)
              );
            });

            if (targetFiles.length === 0) {
              console.log('л¶„м„қ лҢҖмғҒ нҢҢмқј м—ҶмқҢ');
              return;
            }
            console.log(`л¶„м„қ лҢҖмғҒ нҢҢмқј: ${targetFiles.length}к°ң`);

            // в”Җв”Җ 2. нҢҢмқј лӮҙмҡ© мқҪкё° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const files = [];
            for (const f of targetFiles) {
              try {
                const content = fs.readFileSync(f.filename, 'utf-8');
                files.push({
                  filename: f.filename,
                  content:  content.slice(0, 10000),
                  patch:    f.patch || ''
                });
              } catch (e) {
                console.warn(`нҢҢмқј мқҪкё° мӢӨнҢЁ: ${f.filename}`);
              }
            }
            if (files.length === 0) return;

            // в”Җв”Җ 3. ScanOps API нҳём¶ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const apiUrl = process.env.SCANOPS_API_URL.replace(/\/$/, '');
            const apiKey = process.env.SCANOPS_API_KEY;

            let result;
            try {
              const resp = await fetch(`${apiUrl}/api/github/pr-scan`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Scanops-Key': apiKey
                },
                body: JSON.stringify({
                  repo:     `${context.repo.owner}/${context.repo.repo}`,
                  prNumber: context.payload.pull_request.number,
                  files
                })
              });

              if (!resp.ok) {
                core.setFailed(`ScanOps API мҳӨлҘҳ (HTTP ${resp.status}): ${await resp.text()}`);
                return;
              }
              result = await resp.json();
            } catch (e) {
              core.setFailed(`ScanOps API м—°кІ° мӢӨнҢЁ: ${e.message}`);
              return;
            }

            console.log(`мҠӨмә” мҷ„лЈҢ: м·Ём•Ҫм җ ${result.vulnerableCount}к°ң / ${result.totalFiles}к°ң нҢҢмқј (${result.elapsed}s)`);

            // в”Җв”Җ 4. PR лҢ“кёҖ мһ‘м„ұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const SEVERITY_EMOJI = {
              CRITICAL: 'рҹ”ҙ', HIGH: 'рҹ”ҙ', MEDIUM: 'рҹҹЎ', LOW: 'рҹҹў', INFORMATIONAL: 'вҡӘ'
            };
            const SEVERITY_ORDER = {
              CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, INFORMATIONAL: 4
            };

            const vulnerable = (result.findings || [])
              .filter(f => f.detected)
              .sort((a, b) =>
                (SEVERITY_ORDER[a.severity?.toUpperCase()] ?? 5) -
                (SEVERITY_ORDER[b.severity?.toUpperCase()] ?? 5)
              );

            // м·Ём•Ҫм җ м—ҶмқҢ
            if (vulnerable.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: [
                  '## рҹ”’ ScanOps ліҙм•Ҳ мҠӨмә” кІ°кіј',
                  '',
                  'вң… **м·Ём•Ҫм җмқҙ л°ңкІ¬лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.**',
                  '',
                  `л¶„м„қ нҢҢмқј: **${result.totalFiles}к°ң** | мҶҢмҡ” мӢңк°„: ${result.elapsed}s`,
                  '',
                  '> Powered by [ScanOps](https://github.com/26Graduation)'
                ].join('\n')
              });
              return;
            }

            // лӘЁлҚёмқҙ м·Ём•Ҫм җ мқҙлҰ„ лҢҖмӢ  CVE кҙҖл Ё л¬ёкө¬лҘј лұүлҠ” нҢҢмӢұ мҳӨлҘҳ н•„н„°
            const INVALID_VULN = ['no relevant', 'cve', 'n/a', 'вҖ”', 'none'];
            const isValidVuln = v =>
              v && !INVALID_VULN.some(bad => v.toLowerCase().includes(bad));

            const realVulnerable = vulnerable.filter(f => isValidVuln(f.vulnerability));

            if (realVulnerable.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: [
                  '## рҹ”’ ScanOps ліҙм•Ҳ мҠӨмә” кІ°кіј',
                  '',
                  'вң… **м·Ём•Ҫм җмқҙ л°ңкІ¬лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.**',
                  '',
                  `л¶„м„қ нҢҢмқј: **${result.totalFiles}к°ң** | мҶҢмҡ” мӢңк°„: ${result.elapsed}s`,
                  '',
                  '> Powered by [ScanOps](https://github.com/26Graduation)'
                ].join('\n')
              });
              return;
            }

            // в”Җв”Җ м·Ём•Ҫм җ мң нҳ•лі„ мҪ”л“ң нӮӨмӣҢл“ң (лқјмқё л§Өн•‘мҡ©) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const VULN_KEYWORDS = {
              'xss':                  ['innerHTML', 'dangerouslySetInnerHTML', 'document.write', 'outerHTML', 'eval(', 'insertAdjacentHTML'],
              'cross-site scripting': ['innerHTML', 'dangerouslySetInnerHTML', 'document.write', 'outerHTML', 'eval('],
              'code injection':       ['eval(', 'new Function(', 'setTimeout(', 'setInterval(', 'execScript'],
              'sql injection':        ['SELECT', 'INSERT', 'UPDATE', 'DELETE', 'executeQuery', 'createQuery', 'createNativeQuery', 'prepareStatement'],
              'sql':                  ['SELECT', 'INSERT', 'UPDATE', 'DELETE', 'executeQuery'],
              'command injection':    ['exec(', 'spawn(', 'Runtime.exec', 'subprocess', 'os.system', 'shell=True'],
              'path traversal':       ['readFile', 'writeFile', '../', 'path.join', 'fs.open'],
              'hardcoded':            ['password', 'secret', 'api_key', 'apikey', 'token', 'passwd', 'credential'],
              'cors':                 ['Access-Control-Allow-Origin', 'cors', 'allowedOrigins', '*'],
              'deserialization':      ['ObjectInputStream', 'readObject', 'pickle.loads', 'unserialize', 'yaml.load'],
              'ssrf':                 ['fetch(', 'axios.get', 'WebClient', 'HttpClient', 'URL(', 'open('],
              'xxe':                  ['DocumentBuilder', 'XMLReader', 'SAXParser', 'parseXML'],
            };

            /**
             * patch(diff)м—җм„ң м·Ём•Ҫм җ кҙҖл Ё лқјмқё лІҲнҳё нғҗмғү.
             * @returns { line: number, inDiff: boolean } | null
             *   - line    : нҢҢмқј лӮҙ мӢӨм ң лқјмқё лІҲнҳё
             *   - inDiff  : true вҶ’ diff лІ”мң„ лӮҙ(мқёлқјмқё лҢ“кёҖ к°ҖлҠҘ)
             *               false вҶ’ diff лІ”мң„ л°–(мқёлқјмқё л¶Ҳк°Җ, лІҲнҳёл§Ң м•ҲлӮҙ)
             */
            function findVulnLine(patch, vulnType, fullContent) {
              const vulnKey  = vulnType?.toLowerCase() || '';
              const keywords = Object.entries(VULN_KEYWORDS)
                .filter(([k]) => vulnKey.includes(k))
                .flatMap(([, v]) => v);

              if (keywords.length === 0) return null;

              // в”Җв”Җ 1м°Ё: patch(diff) м•Ҳм—җм„ң нғҗмғү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
              if (patch) {
                let lineNum = 0;
                for (const raw of patch.split('\n')) {
                  const header = raw.match(/^@@ -\d+(?:,\d+)? \+(\d+)/);
                  if (header) { lineNum = parseInt(header[1]) - 1; continue; }
                  if (raw.startsWith('-'))   continue;
                  if (!raw.startsWith('\\')) lineNum++;

                  if (raw.startsWith('+') || raw.startsWith(' ')) {
                    const content = raw.slice(1).toLowerCase();
                    if (keywords.some(k => content.includes(k.toLowerCase()))) {
                      return { line: lineNum, inDiff: true };
                    }
                  }
                }
              }

              // в”Җв”Җ 2м°Ё: м „мІҙ нҢҢмқјм—җм„ң нғҗмғү (diff л°–) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
              if (fullContent) {
                const lines = fullContent.split('\n');
                for (let i = 0; i < lines.length; i++) {
                  const content = lines[i].toLowerCase();
                  if (keywords.some(k => content.includes(k.toLowerCase()))) {
                    return { line: i + 1, inDiff: false };
                  }
                }
              }

              return null;
            }

            // в”Җв”Җ м·Ём•Ҫм җлі„ лқјмқё нғҗмғү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const vulnLineMap = new Map();
            for (const f of realVulnerable) {
              const patchData   = targetFiles.find(t => t.filename === f.filename);
              const fileContent = files.find(t => t.filename === f.filename)?.content;
              vulnLineMap.set(
                f.filename + f.vulnerability,
                findVulnLine(patchData?.patch, f.vulnerability, fileContent)
              );
            }

            // в”Җв”Җ кіөнҶө лҢ“кёҖ ліёл¬ё мғқм„ұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            function buildCommentBody(f, lineInfo, fileContent, lineNum) {
              const emoji    = SEVERITY_EMOJI[f.severity?.toUpperCase()] || 'вҡ пёҸ';
              const cvssLine = f.cvssScore ? ` | CVSS ${f.cvssScore}` : '';
              const cveLines = (f.cveReferences || []).slice(0, 3)
                .filter(c => c.cve_id && c.cve_id !== 'N/A')
                .map(c => `- \`${c.cve_id}\` (${c.severity}, ${c.cwe_id})`)
                .join('\n');

              // мҪ”л“ң мҠӨлӢҲнҺ«: м·Ём•Ҫм җ мӨ„ Вұ2мӨ„ м»Ён…ҚмҠӨнҠё
              let codeSnippet = '';
              if (fileContent && lineNum) {
                const lines = fileContent.split('\n');
                const start = Math.max(0, lineNum - 3);
                const end   = Math.min(lines.length, lineNum + 2);
                const ext   = f.filename.split('.').pop() || 'ts';
                const snippet = lines.slice(start, end).map((line, i) => {
                  const num    = start + i + 1;
                  const marker = num === lineNum ? 'вқҜ' : ' ';
                  return `${marker} ${String(num).padStart(3)} в”Ӯ ${line}`;
                }).join('\n');
                codeSnippet = `\n\`\`\`${ext}\n${snippet}\n\`\`\`\n`;
              }

              return [
                `### ${emoji} [ScanOps] ${f.vulnerability}`,
                `> **нҢҢмқј:** \`${f.filename}\` В· **мӢ¬к°ҒлҸ„:** ${f.severity}${cvssLine} В· **мң„м№ҳ:** ${lineInfo}`,
                codeSnippet,
                '**кіөкІ© мӢңлӮҳлҰ¬мҳӨ**',
                f.attack || 'вҖ”',
                '',
                '**мҲҳм • л°©лІ•**',
                f.fix || 'вҖ”',
                ...(cveLines ? ['', '**кҙҖл Ё CVE**', cveLines] : [])
              ].join('\n');
            }

            // в”Җв”Җ мҡ”м•Ҫ н…Ңмқҙлё” (overviewл§Ң) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const rows = realVulnerable.map(f => {
              const emoji = SEVERITY_EMOJI[f.severity?.toUpperCase()] || 'вҡ пёҸ';
              const cvss  = f.cvssScore ? ` (CVSS ${f.cvssScore})` : '';
              const found = vulnLineMap.get(f.filename + f.vulnerability);
              const loc   = found
                ? found.inDiff ? `${found.line}лІҲм§ё мӨ„` : `${found.line}лІҲм§ё мӨ„ (ліҖкІҪ лІ”мң„ л°–)`
                : 'мӨ„ нҠ№м • л¶Ҳк°Җ';
              return `| ${emoji} **${f.severity}${cvss}** | \`${f.filename}\` | ${f.vulnerability} | ${loc} |`;
            });

            const summary = [
              '## рҹ”Қ ScanOps ліҙм•Ҳ мҠӨмә” кІ°кіј',
              '',
              `> **${realVulnerable.length}к°ң м·Ём•Ҫм җ л°ңкІ¬** | л¶„м„қ нҢҢмқј: ${result.totalFiles}к°ң | мҶҢмҡ”: ${result.elapsed}s`,
              '',
              '| мӢ¬к°ҒлҸ„ | нҢҢмқј | м·Ём•Ҫм җ мң нҳ• | мң„м№ҳ |',
              '|--------|------|------------|------|',
              ...rows,
              '',
              '> Powered by [ScanOps](https://github.com/26Graduation)'
            ].join('\n');

            // в”Җв”Җ PR Review мқёлқјмқё лҢ“кёҖ (diff лІ”мң„ лӮҙ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const reviewComments = [];
            for (const f of realVulnerable) {
              const found       = vulnLineMap.get(f.filename + f.vulnerability);
              if (!found?.inDiff) continue;
              const fileContent = files.find(t => t.filename === f.filename)?.content;
              reviewComments.push({
                path: f.filename,
                line: found.line,
                body: buildCommentBody(f, `${found.line}лІҲм§ё мӨ„ (ліҖкІҪлҗң мҪ”л“ң)`, fileContent, found.line)
              });
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'COMMENT',
                body: summary,
                comments: reviewComments
              });
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: summary
              });
            }

            // в”Җв”Җ к°ңлі„ мқҙмҠҲ лҢ“кёҖ: diff лІ”мң„ л°– лҳҗлҠ” мӨ„ нҠ№м • л¶Ҳк°Җ м·Ём•Ҫм җ в”Җв”Җв”Җв”Җв”Җв”Җ
            for (const f of realVulnerable) {
              const found = vulnLineMap.get(f.filename + f.vulnerability);
              if (found?.inDiff) continue;

              const lineInfo    = found
                ? `${found.line}лІҲм§ё мӨ„ вҡ пёҸ (PR ліҖкІҪ лІ”мң„ л°– вҖ” кё°мЎҙ мҪ”л“ңмқҳ м·Ём•Ҫм җ)`
                : 'мӨ„ нҠ№м • л¶Ҳк°Җ';
              const fileContent = files.find(t => t.filename === f.filename)?.content;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: buildCommentBody(f, lineInfo, fileContent, found?.line)
              });
            }
