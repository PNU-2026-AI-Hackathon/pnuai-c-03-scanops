spring:
  codec:
    max-in-memory-size: 10MB
  datasource:
    # Railway PostgreSQL 플러그인은 PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD 자동 주입
    # JDBC_DATABASE_URL을 수동 설정하거나, PG* 개별 변수를 조합해서 사용
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:scanops}}
    username: ${PGUSER:${JDBC_DATABASE_USERNAME:scanops}}
    password: ${PGPASSWORD:${JDBC_DATABASE_PASSWORD:scanops}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway가 스키마 소유 → Hibernate는 엔티티↔테이블 검증만
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true   # 기존 비-Flyway DB에도 안전하게 적용
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_OAUTH_CLIENT_ID:}
            client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
            scope: read:user,user:email
            # authorize·token 교환에서 동일한 redirect_uri를 쓰도록 고정(프록시 http/https 불일치 방지).
            # 로컬 테스트 시 GITHUB_OAUTH_REDIRECT_URI=http://localhost:8080/login/oauth2/code/github 로 덮어쓰기.
            redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:https://scanops-backend-production.up.railway.app/login/oauth2/code/github}

# 사용자 로그인용 OAuth/JWT (GitHub App과 별개)
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    # 운영에선 32바이트 이상 랜덤 시크릿을 JWT_SECRET 환경변수로 주입
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-min!!}
    ttl-hours: ${JWT_TTL_HOURS:168}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}
  # Railway 등 리버스 프록시 뒤에서 https/호스트를 올바르게 인식 → OAuth redirect_uri가
  # https://<public-host>/login/oauth2/code/github 로 정확히 생성되도록.
  forward-headers-strategy: framework

zap:
  host: ${ZAP_HOST:http://localhost:8090}
  api-key: ${ZAP_API_KEY:}

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6
  gemini:
    api-key: ${GEMINI_API_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://*.vercel.app,https://*.up.railway.app}

scanops:
  model:
    url: ${SCANOPS_MODEL_URL:http://localhost:8100}
  api-key: ${SCANOPS_API_KEY:}
  dast:
    # DAST(웹) 스캔에 도메인 소유권 인증을 강제할지. 데모에서 임시로 끄려면 false.
    require-verification: ${DAST_REQUIRE_VERIFICATION:true}

github:
  # 공개 레포 조회용 선택적 토큰(레이트리밋). 프라이빗 접근은 아래 App 설치로 처리.
  token: ${GITHUB_TOKEN:}
  app:
    id: ${GITHUB_APP_ID:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}
    # github.com/apps/<slug> 의 slug. 설치 URL 생성에 사용.
    slug: ${GITHUB_APP_SLUG:}
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET:}

logging:
  level:
    com.scanops.ai.AiRouter: ERROR
    com.scanops.vulnerability.VulnMetaMigrationService: WARN
