spring:
  codec:
    max-in-memory-size: 10MB
  datasource:
    # Railway PostgreSQL 플러그인은 PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD 자동 주입
    # JDBC_DATABASE_URL을 수동 설정하거나, PG* 개별 변수를 조합해서 사용
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:scanops}}
    username: ${PGUSER:${JDBC_DATABASE_USERNAME:scanops}}
    password: ${PGPASSWORD:${JDBC_DATABASE_PASSWORD:scanops}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_OAUTH_CLIENT_ID:}
            client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
            scope: read:user,user:email

# 사용자 로그인용 OAuth/JWT (GitHub App과 별개)
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    # 운영에선 32바이트 이상 랜덤 시크릿을 JWT_SECRET 환경변수로 주입
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-min!!}
    ttl-hours: ${JWT_TTL_HOURS:168}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}

zap:
  host: ${ZAP_HOST:http://localhost:8090}
  api-key: ${ZAP_API_KEY:}

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6
  gemini:
    api-key: ${GEMINI_API_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://*.vercel.app,https://*.up.railway.app}

scanops:
  model:
    url: ${SCANOPS_MODEL_URL:http://localhost:8100}
  api-key: ${SCANOPS_API_KEY:}

github:
  app:
    id: ${GITHUB_APP_ID:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET:}

logging:
  level:
    com.scanops.ai.AiRouter: ERROR
    com.scanops.vulnerability.VulnMetaMigrationService: WARN
