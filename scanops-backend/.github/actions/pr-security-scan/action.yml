name: 'ScanOps PR Security Scan'
description: 'PR diff에서 보안 취약점을 AI로 분석하고 리뷰 댓글로 알려줍니다'

inputs:
  api-url:
    description: 'ScanOps 백엔드 URL (예: https://your-backend.up.railway.app)'
    required: true
  api-key:
    description: 'ScanOps API 인증 키 (SCANOPS_API_KEY 환경변수 값)'
    required: true
  github-token:
    description: 'PR 댓글 작성용 GitHub Token'
    required: false
    default: ${{ github.token }}
  fail-on-high:
    description: 'HIGH/CRITICAL 취약점 발견 시 워크플로 실패 처리 (true/false)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run ScanOps Security Analysis
      uses: actions/github-script@v7
      env:
        SCANOPS_API_URL: ${{ inputs.api-url }}
        SCANOPS_API_KEY: ${{ inputs.api-key }}
        FAIL_ON_HIGH: ${{ inputs.fail-on-high }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const path = require('path');

          const TARGET_EXTS = new Set([
            '.java', '.kt', '.jsx', '.tsx', '.js', '.ts',
            '.py', '.go', '.rs', '.c', '.cpp', '.h',
            '.php', '.rb', '.yml', '.yaml'
          ]);
          const EXCLUDE_DIRS = ['node_modules', '.git', 'dist', 'build',
                                'target', 'vendor', '__pycache__', '.venv'];

          // ── 1. PR 변경 파일 목록 조회 ──────────────────────────────────────
          const { data: changedFiles } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number,
            per_page: 50
          });

          const targetFiles = changedFiles.filter(f => {
            if (f.status === 'removed') return false;
            const ext = path.extname(f.filename).toLowerCase();
            if (!TARGET_EXTS.has(ext)) return false;
            return !EXCLUDE_DIRS.some(d =>
              f.filename.includes(`/${d}/`) || f.filename.startsWith(`${d}/`)
            );
          });

          if (targetFiles.length === 0) {
            console.log('분석 대상 파일 없음 (지원 확장자 변경 없음)');
            return;
          }
          console.log(`분석 대상 파일: ${targetFiles.length}개`);

          // ── 2. 파일 내용 읽기 (checkout된 파일 직접 읽기) ──────────────────
          const files = [];
          for (const f of targetFiles) {
            try {
              const content = fs.readFileSync(f.filename, 'utf-8');
              files.push({
                filename: f.filename,
                content: content.slice(0, 10000),  // 10KB 제한
                patch: f.patch || ''
              });
            } catch (e) {
              console.warn(`파일 읽기 실패: ${f.filename} — ${e.message}`);
            }
          }

          if (files.length === 0) {
            console.log('읽을 수 있는 파일 없음');
            return;
          }

          // ── 3. ScanOps API 호출 ────────────────────────────────────────────
          const apiUrl = process.env.SCANOPS_API_URL.replace(/\/$/, '');
          const apiKey = process.env.SCANOPS_API_KEY;

          let result;
          try {
            const resp = await fetch(`${apiUrl}/api/github/pr-scan`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Scanops-Key': apiKey
              },
              body: JSON.stringify({
                repo: `${context.repo.owner}/${context.repo.repo}`,
                prNumber: context.payload.pull_request.number,
                files
              })
            });

            if (!resp.ok) {
              const errText = await resp.text();
              core.setFailed(`ScanOps API 오류 (HTTP ${resp.status}): ${errText}`);
              return;
            }
            result = await resp.json();
          } catch (e) {
            core.setFailed(`ScanOps API 연결 실패: ${e.message}`);
            return;
          }

          console.log(`스캔 완료: 취약점 ${result.vulnerableCount}개 / ${result.totalFiles}개 파일 (${result.elapsed}s)`);

          // ── 4. PR 리뷰 댓글 작성 ──────────────────────────────────────────
          const SEVERITY_EMOJI = {
            CRITICAL: '🔴', HIGH: '🔴', MEDIUM: '🟡', LOW: '🟢', INFORMATIONAL: '⚪'
          };
          const SEVERITY_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, INFORMATIONAL: 4 };

          const vulnerableFindings = (result.findings || [])
            .filter(f => f.detected)
            .sort((a, b) =>
              (SEVERITY_ORDER[a.severity?.toUpperCase()] ?? 5) -
              (SEVERITY_ORDER[b.severity?.toUpperCase()] ?? 5)
            );

          if (vulnerableFindings.length === 0) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## 🔒 ScanOps 보안 스캔 결과',
                '',
                '✅ **취약점이 발견되지 않았습니다.**',
                '',
                `분석 파일: **${result.totalFiles}개** | 소요 시간: ${result.elapsed}s`,
                '',
                '> Powered by [ScanOps](https://github.com/26Graduation/scanops-backend)'
              ].join('\n')
            });
            return;
          }

          // 요약 테이블
          const summaryRows = vulnerableFindings.map(f => {
            const emoji = SEVERITY_EMOJI[f.severity?.toUpperCase()] || '⚠️';
            const cvss = f.cvssScore ? ` (CVSS ${f.cvssScore})` : '';
            return `| ${emoji} **${f.severity}${cvss}** | \`${f.filename}\` | ${f.vulnerability} |`;
          });

          const summaryBody = [
            '## 🔍 ScanOps 보안 스캔 결과',
            '',
            `> **${vulnerableFindings.length}개 취약점 발견** | 분석 파일: ${result.totalFiles}개 | 소요: ${result.elapsed}s`,
            '',
            '| 심각도 | 파일 | 취약점 유형 |',
            '|--------|------|------------|',
            ...summaryRows,
            '',
            '> 각 파일에 상세 리뷰 댓글이 달려 있습니다.',
            '> Powered by [ScanOps](https://github.com/26Graduation/scanops-backend)'
          ].join('\n');

          // 파일별 인라인 리뷰 댓글
          const reviewComments = [];
          for (const finding of vulnerableFindings) {
            const emoji = SEVERITY_EMOJI[finding.severity?.toUpperCase()] || '⚠️';
            const cvssLine = finding.cvssScore
              ? `\n**CVSS Score:** ${finding.cvssScore}`
              : '';

            const cveLines = (finding.cveReferences || [])
              .slice(0, 3)
              .map(c => `- \`${c.cveId || c.cve_id}\` (${c.severity}, ${c.cweId || c.cwe_id})`)
              .join('\n');

            const body = [
              `### ${emoji} [ScanOps] ${finding.vulnerability}`,
              `**심각도:** ${finding.severity}${cvssLine}`,
              '',
              '**공격 시나리오:**',
              finding.attack || '—',
              '',
              '**수정 방법:**',
              finding.fix || '—',
              ...(cveLines ? ['', '**관련 CVE:**', cveLines] : [])
            ].join('\n');

            const line = finding.diffLine || finding.diff_line;
            if (line && line > 0) {
              reviewComments.push({ path: finding.filename, line, body });
            }
          }

          // PR Review 제출 (인라인 댓글 + 요약)
          try {
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'COMMENT',
              body: summaryBody,
              comments: reviewComments
            });
          } catch (reviewErr) {
            console.warn(`리뷰 생성 실패, 일반 댓글로 대체: ${reviewErr.message}`);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: summaryBody
            });
          }

          // ── 5. HIGH/CRITICAL 발견 시 워크플로 실패 처리 ────────────────────
          if (process.env.FAIL_ON_HIGH === 'true') {
            const hasHighCritical = vulnerableFindings.some(f => {
              const s = f.severity?.toUpperCase();
              return s === 'HIGH' || s === 'CRITICAL';
            });
            if (hasHighCritical) {
              core.setFailed(
                `HIGH/CRITICAL 취약점 ${vulnerableFindings.filter(f => ['HIGH','CRITICAL'].includes(f.severity?.toUpperCase())).length}개 발견`
              );
            }
          }
