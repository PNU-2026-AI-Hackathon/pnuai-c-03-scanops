name: ScanOps Security Scan

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    name: ScanOps 보안 취약점 분석
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Run ScanOps Security Analysis
        uses: actions/github-script@v7
        env:
          SCANOPS_API_URL: ${{ secrets.SCANOPS_API_URL }}
          SCANOPS_API_KEY: ${{ secrets.SCANOPS_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            const TARGET_EXTS = new Set([
              '.java', '.kt', '.jsx', '.tsx', '.js', '.ts',
              '.py', '.go', '.rs', '.c', '.cpp', '.h',
              '.php', '.rb', '.yml', '.yaml'
            ]);
            const EXCLUDE_DIRS = [
              'node_modules', '.git', 'dist', 'build',
              'target', 'vendor', '__pycache__', '.venv'
            ];

            // ── 1. PR 변경 파일 목록 조회 ──────────────────────────────────
            const { data: changedFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 50
            });

            const targetFiles = changedFiles.filter(f => {
              if (f.status === 'removed') return false;
              const ext = path.extname(f.filename).toLowerCase();
              if (!TARGET_EXTS.has(ext)) return false;
              return !EXCLUDE_DIRS.some(d =>
                f.filename.includes(`/${d}/`) || f.filename.startsWith(`${d}/`)
              );
            });

            if (targetFiles.length === 0) { console.log('분석 대상 파일 없음'); return; }
            console.log(`분석 대상 파일: ${targetFiles.length}개`);

            // ── 2. 파일 내용 읽기 ──────────────────────────────────────────
            const files = [];
            for (const f of targetFiles) {
              try {
                const content = fs.readFileSync(f.filename, 'utf-8');
                files.push({ filename: f.filename, content: content.slice(0, 10000), patch: f.patch || '' });
              } catch (e) { console.warn(`파일 읽기 실패: ${f.filename}`); }
            }
            if (files.length === 0) return;

            // ── 3. ScanOps API 호출 ────────────────────────────────────────
            const apiUrl = process.env.SCANOPS_API_URL.replace(/\/$/, '');
            const apiKey = process.env.SCANOPS_API_KEY;

            let result;
            try {
              const resp = await fetch(`${apiUrl}/api/github/pr-scan`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Scanops-Key': apiKey },
                body: JSON.stringify({
                  repo: `${context.repo.owner}/${context.repo.repo}`,
                  prNumber: context.payload.pull_request.number,
                  files
                })
              });
              if (!resp.ok) { core.setFailed(`ScanOps API 오류 (HTTP ${resp.status}): ${await resp.text()}`); return; }
              result = await resp.json();
            } catch (e) { core.setFailed(`ScanOps API 연결 실패: ${e.message}`); return; }

            console.log(`스캔 완료: 취약점 ${result.vulnerableCount}개 / ${result.totalFiles}개 파일 (${result.elapsed}s)`);

            // ── 4. 결과 필터링 ─────────────────────────────────────────────
            const SEVERITY_EMOJI  = { CRITICAL: '🔴', HIGH: '🔴', MEDIUM: '🟡', LOW: '🟢' };
            const SEVERITY_ORDER  = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
            const INVALID_VULN    = ['no relevant', 'n/a', '—', 'none'];
            const isValidVuln = v => v && !INVALID_VULN.some(bad => v.toLowerCase().includes(bad));

            const vulnerable = (result.findings || [])
              .filter(f => f.detected && isValidVuln(f.vulnerability))
              .sort((a, b) => (SEVERITY_ORDER[a.severity?.toUpperCase()] ?? 5) - (SEVERITY_ORDER[b.severity?.toUpperCase()] ?? 5));

            if (vulnerable.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `## 🔒 ScanOps 보안 스캔 결과\n\n✅ **취약점이 발견되지 않았습니다.**\n\n분석 파일: **${result.totalFiles}개** | 소요: ${result.elapsed}s\n\n> Powered by [ScanOps](https://github.com/26Graduation)`
              });
              return;
            }

            // ── 5. 취약점 키워드 → 라인 탐색 (모든 매칭 라인 반환) ─────────
            const VULN_KEYWORDS = {
              'ssrf':              ['fetch(', 'axios.get', 'webclient', 'httpclient', 'url(', 'open('],
              'xss':               ['innerhtml', 'dangerouslysetinnerhtml', '__html', 'document.write', 'outerhtml', 'eval('],
              'cross-site scripting': ['innerhtml', 'dangerouslysetinnerhtml', 'document.write', 'eval('],
              'code injection':    ['eval(', 'new function(', 'settimeout(', 'setinterval(', 'execscript'],
              'injection':         ['eval(', 'new function('],
              'sql injection':     ['select ', 'insert ', 'update ', 'delete ', 'executequery', 'createquery'],
              'command injection': ['exec(', 'spawn(', 'os.system', 'subprocess', 'shell=true'],
              'path traversal':    ['readfile', 'writefile', '../', 'path.join', 'fs.open'],
              'hardcoded':         ['password', 'secret', 'api_key', 'apikey', 'token'],
              'cors':              ['access-control-allow-origin', 'cors(', 'allowedorigins'],
              'deserialization':   ['objectinputstream', 'readobject', 'pickle.loads', 'unserialize'],
              'xxe':               ['documentbuilder', 'xmlreader', 'saxparser'],
            };

            function findAllVulnLines(patch, vulnType) {
              const vulnKey  = (vulnType || '').toLowerCase();
              const keywords = Object.entries(VULN_KEYWORDS)
                .filter(([k]) => vulnKey.includes(k))
                .flatMap(([, v]) => v);
              if (!patch || keywords.length === 0) return [];

              const matched = [];
              let lineNum = 0;
              for (const raw of patch.split('\n')) {
                const header = raw.match(/^@@ -\d+(?:,\d+)? \+(\d+)/);
                if (header) { lineNum = parseInt(header[1]) - 1; continue; }
                if (raw.startsWith('-')) continue;
                if (!raw.startsWith('\\')) lineNum++;
                if (raw.startsWith('+')) {
                  const content = raw.slice(1).toLowerCase();
                  if (keywords.some(k => content.includes(k.toLowerCase()))) {
                    matched.push(lineNum);
                  }
                }
              }
              return matched;
            }

            // ── 6. 댓글 본문 생성 ─────────────────────────────────────────
            function buildBody(f, lineLabel) {
              const emoji    = SEVERITY_EMOJI[f.severity?.toUpperCase()] || '⚠️';
              const cvssLine = f.cvssScore ? `\n**CVSS Score:** ${f.cvssScore}` : '';
              const cveLines = (f.cveReferences || []).slice(0, 3)
                .filter(c => c.cve_id && c.cve_id !== 'N/A')
                .map(c => `- \`${c.cve_id}\` (${c.severity}, ${c.cwe_id})`)
                .join('\n');
              return [
                `### ${emoji} [ScanOps] ${f.vulnerability}`,
                `**파일:** \`${f.filename}\` | **심각도:** ${f.severity}${cvssLine}`,
                `**위치:** ${lineLabel}`,
                '',
                '**공격 시나리오:**', f.attack || '—',
                '',
                '**수정 방법:**', f.fix || '—',
                ...(cveLines ? ['', '**관련 CVE:**', cveLines] : [])
              ].join('\n');
            }

            // ── 7. 요약 테이블 ─────────────────────────────────────────────
            const rows = vulnerable.map(f => {
              const emoji = SEVERITY_EMOJI[f.severity?.toUpperCase()] || '⚠️';
              const cvss  = f.cvssScore ? ` (CVSS ${f.cvssScore})` : '';
              const lines = findAllVulnLines(targetFiles.find(t => t.filename === f.filename)?.patch, f.vulnerability);
              const loc   = lines.length > 0 ? lines.map(l => `${l}번째 줄`).join(', ') : '줄 특정 불가';
              return `| ${emoji} **${f.severity}${cvss}** | \`${f.filename}\` | ${f.vulnerability} | ${loc} |`;
            });

            const summary = [
              '## 🔍 ScanOps 보안 스캔 결과',
              '',
              `> **${vulnerable.length}개 취약점 발견** | 분석 파일: ${result.totalFiles}개 | 소요: ${result.elapsed}s`,
              '',
              '| 심각도 | 파일 | 취약점 유형 | 위치 |',
              '|--------|------|------------|------|',
              ...rows,
              '',
              '> Powered by [ScanOps](https://github.com/26Graduation)'
            ].join('\n');

            // ── 8. 인라인 댓글 (라인별 각각) + 요약 리뷰 ─────────────────
            const reviewComments = [];
            for (const f of vulnerable) {
              const patch = targetFiles.find(t => t.filename === f.filename)?.patch;
              const lines = findAllVulnLines(patch, f.vulnerability);
              if (lines.length === 0) continue;
              for (const line of lines) {
                reviewComments.push({
                  path: f.filename,
                  line,
                  body: buildBody(f, `${line}번째 줄 (변경된 코드)`)
                });
              }
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'COMMENT',
                body: summary,
                comments: reviewComments
              });
            } catch (e) {
              console.warn(`인라인 댓글 실패, 일반 댓글로 대체: ${e.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: summary
              });
            }

            // ── 9. 줄 특정 불가 취약점은 일반 댓글로 ─────────────────────
            for (const f of vulnerable) {
              const patch = targetFiles.find(t => t.filename === f.filename)?.patch;
              const lines = findAllVulnLines(patch, f.vulnerability);
              if (lines.length > 0) continue;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: buildBody(f, '줄 특정 불가')
              });
            }
